[workspace]
name = "nn-zero-to-hero"
version = "0.1.0"
description = "Neural Networks: Zero to Hero exercises and notebooks"
channels = ["conda-forge"]
platforms = ["linux-64"]

[tasks]
test = "python test.py"
notebook = "jupyter lab"

[dependencies]
python = "3.11.*"
pytorch-cpu = ">=2.2,<3"
numpy = "1.26.*"
matplotlib = "3.8.*"
pandas = "2.2.*"
scipy = "1.12.*"
graphviz = ">=9,<13"
python-graphviz = "0.20.*"
ipykernel = "6.29.*"
jupyterlab = ">=4,<5"
